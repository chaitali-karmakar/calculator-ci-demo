<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <br>
    <h1>My First Calculator App</h1>
    <br>

    <label for="num1">Enter Number 1:</label>
    <input type="text" id="num1">
    <label for="num2">Enter Number 2:</label>
    <input type="text" id="num2"><br><br>
    <button type="button" id="btn-add">Add</button>
    <button type="button" id="btn-subtract">Subtract</button>
    <button type="button" id="btn-multiply">Multiply</button>
    <button type="button" id="btn-square">Square</button>
    <button type="button" id="btn-cube">Cube</button>
    <button type="button" id="btn-divide">Divide</button><br><br>
    <label for="result">Result:</label>
    <input type="text" id="result" readonly>

    <script src="calculator.js"></script>
    <script src="script.js"></script>
</body>

</html>
